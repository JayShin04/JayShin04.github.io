<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    plugins: [tailwind.plugin(function({ addBase }) {
      addBase({
        'h1': { fontSize: '2.25rem', fontWeight: '700', marginTop: '0.25rem', marginBottom: '0.25rem' },
        'h2': { fontSize: '1.875rem', fontWeight: '700', marginTop: '0.25rem', marginBottom: '0.25rem' },
        'h3': { fontSize: '1.5rem', fontWeight: '600', marginTop: '0.25rem', marginBottom: '0.25rem' },
        'h4': { fontSize: '1.25rem', fontWeight: '600', marginTop: '0.25rem', marginBottom: '0.25rem' },
        'ul': { listStyleType: 'disc', paddingLeft: '1.5rem', marginBottom: '1rem' },
        'ol': { listStyleType: 'decimal', paddingLeft: '1.5rem', marginBottom: '1rem' },
        'li': { marginBottom: '0.25rem' },
        'strong': { fontWeight: '700' },
        'hr': { marginTop: '1.5rem', marginBottom: '1.5rem' },
      })
    })]
  }
</script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox/fancybox.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox/fancybox.umd.js"></script>
</head>
<body>
  {% include header.html %}
  <main class="container mx-auto">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    Fancybox.bind("[data-fancybox]", {});
  </script>
</body>
</html>
