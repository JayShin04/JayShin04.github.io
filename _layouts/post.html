---
layout: default
---

<article class="post">
  <div class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%Y.%m.%d %H:%M" }}</span>
      <span class="post-category tag-{{ page.color }}">{{ page.category }}</span>
    </div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
